---
- name: Container - dashboard - config
  ansible.builtin.copy:
    src: '{{ podman_dashboard_config }}'
    dest: '{{ podman_dashboard_volume }}/apps.json'
    mode: '0644'
  notify: Container - dashboard - restart

- name: Container - dashboard - define
  tags: dashboard
  containers.podman.podman_container:
    name: dashboard
    image: docker.io/phntxx/dashboard:latest
    privileged: true
    security_opt: label=disable
    user: root
    volume: '{{ podman_dashboard_volume }}/:/app/data/'
    ports:
      - 8383:8080
    generate_systemd:
      path: /etc/systemd/system/

- name: Container - dashboard - start
  ansible.builtin.service:
    name: container-dashboard
    state: started
    enabled: true
