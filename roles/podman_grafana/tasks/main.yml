---
- name: Container - grafana - print base path
  ansible.builtin.debug:
    msg: '{{ podman_grafana_volume }}'

- name: Container - grafana
  containers.podman.podman_container:
    name: grafana
    image: docker.io/grafana/grafana
    state: started
    privileged: true
    conmon_pidfile: '{{ podman_grafana_volume }}_data/grafana.pid'
    security_opt: label=disable
    volume:
      - '{{ podman_grafana_volume }}_data/:/var/lib/grafana/:Z'
      - '{{ podman_grafana_volume }}_config/:/etc/grafana/:Z'
    user: root
    ports:
      - 3000:3000
